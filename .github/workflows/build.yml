name: 'Publish and Deploy'

on:
    push:
        branches: [master]
    workflow_dispatch:
        inputs:
            build_windows_x86_64:
                description: 'Build for Windows x86_64'
                required: false
                type: boolean
                default: true

permissions:
    contents: write

jobs:
    publish-tauri:
        runs-on: windows-latest
        timeout-minutes: 60
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check Tauri signing key
              shell: bash
              run: |
                  if [ -z "${{ secrets.TAURI_KEY_PASSWORD }}" ]; then
                    echo "::error::TAURI_KEY_PASSWORD is required but not set."
                    exit 1
                  fi

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install frontend dependencies
              run: pnpm install

            - name: Build Tauri app (without release)
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
              run: pnpm tauri build

            - name: Upload Windows artifacts (MSI)
              uses: actions/upload-artifact@v4
              with:
                  name: Windows-MSI-Installer
                  path: src-tauri/target/release/bundle/msi/*.msi
                  if-no-files-found: error

            - name: Upload Windows artifacts (NSIS/EXE)
              uses: actions/upload-artifact@v4
              with:
                  name: Windows-EXE-Installer
                  path: src-tauri/target/release/bundle/nsis/*.exe
                  if-no-files-found: warn

            - name: Upload additional bundle files
              uses: actions/upload-artifact@v4
              with:
                  name: Windows-Bundle-Full
                  path: src-tauri/target/release/bundle/
                  if-no-files-found: warn