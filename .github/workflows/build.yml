name: 'Publish and Deploy'

on:
    push:
        branches: [master]
    workflow_dispatch:
        inputs:
            build_windows_x86_64:
                description: 'Build for Windows x86_64'
                required: false
                type: boolean
                default: true

permissions:
    contents: write
    # 添加 release 权限
    actions: read
    checks: read
    deployments: read
    issues: read
    packages: read
    pages: read
    pull-requests: read
    repository-projects: read
    security-events: read
    statuses: read

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    publish-tauri:
        permissions:
            contents: write
            # 添加以下权限
            pull-requests: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: 'windows-latest'
                      target: 'x86_64-pc-windows-msvc'
                      args: ''

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60
        steps:
            - name: Checkout
              uses: actions/checkout@v4  # 升级到 v4

            - name: Check Tauri
              shell: bash
              run: |
                  if [ -z "${{ secrets.TAURI_KEY_PASSWORD }}" ]; then
                    echo "::error::TAURI_KEY_PASSWORD is required but not set."
                    exit 1
                  fi

            - name: Install rust target
              run: rustup target add ${{ matrix.target }}

            - uses: pnpm/action-setup@v4  # 升级到 v4
              with:
                  version: latest

            - name: Sync node version and setup cache
              uses: actions/setup-node@v4
              with:
                  node-version: 22  # 升级到 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install frontend dependencies
              run: pnpm install

            - name: Create Release Body
              id: release_body
              run: |
                  if [ -f "./Note.md" ]; then
                    # 读取 Note.md 内容作为 release body
                    BODY=$(cat ./Note.md)
                    echo "body<<EOF" >> $GITHUB_OUTPUT
                    echo "$BODY" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  else
                    echo "body=Auto-generated release" >> $GITHUB_OUTPUT
                  fi
              shell: bash

            - uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
              with:
                  tagName: 'PakePlus-v__VERSION__'
                  releaseName: 'PakePlus v__VERSION__'
                  releaseBody: ${{ steps.release_body.outputs.body }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}